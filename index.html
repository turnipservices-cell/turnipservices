<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turnip Services.com</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    html { scroll-behavior: smooth; }
    .game-card {
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .game-card:hover {
      transform: translateY(-12px);
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
    }
    .game-card img {
      height: 220px;
      object-fit: cover;
      width: 100%;
    }
    #rotateMessage {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0d0d0d; color: white; display: none;
      justify-content: center; align-items: center; text-align: center;
      z-index: 9999;
    }
    .phone-icon { font-size: 70px; margin-bottom: 20px; animation: rotatePhone 1.5s infinite ease-in-out; }
    @keyframes rotatePhone { 0% { transform: rotate(0deg); } 50% { transform: rotate(90deg); } 100% { transform: rotate(0deg); } }
    @media screen and (max-width: 900px) and (orientation: portrait) {
      #rotateMessage { display: flex; }
    }
  </style>
</head>
<body class="bg-gray-100 font-sans">

  <!-- ROTATE MESSAGE -->
  <div id="rotateMessage">
    <div class="rotate-content">
      <div class="phone-icon">📱</div>
      <h2 class="text-4xl font-bold mb-4">Turn your phone</h2>
      <p class="text-xl text-gray-300">This website works better in landscape mode</p>
    </div>
  </div>

  <!-- NAVBAR -->
  <nav class="bg-white border-b border-gray-200 py-5 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
      <h1 class="text-3xl font-bold text-black cursor-pointer" onclick="window.location.reload()">
        Turnip Services.com
      </h1>
      <div class="flex items-center gap-5">
        <a href="#help" class="px-8 py-3 border-2 border-black rounded-full text-lg font-medium hover:bg-gray-100 transition">Help</a>
        <a href="#about" class="px-8 py-3 border-2 border-black rounded-full text-lg font-medium hover:bg-gray-100 transition">About</a>
        <a href="#media" class="px-8 py-3 border-2 border-black rounded-full text-lg font-medium hover:bg-gray-100 transition">Media</a>
        
        <button id="authButton" onclick="showLoginModal()" 
          class="px-8 py-3 bg-black text-white rounded-full text-lg font-semibold hover:bg-gray-800 transition">
          Login/SignUp
        </button>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="bg-white text-center py-28">
    <div class="max-w-5xl mx-auto px-6">
      <h2 class="text-6xl md:text-7xl font-black text-black leading-tight mb-6">
        Welcome to <br /> Turnip Services.com!
      </h2>
      <p class="text-2xl text-gray-600 mb-10">Premium gaming hacks, boosts & tools</p>
      <button onclick="scrollToGames()" 
        class="bg-black text-white px-10 py-4 rounded-full text-xl font-semibold hover:bg-gray-800 transition">
        Browse Services ↓
      </button>
    </div>
  </section>

  <!-- SEARCH / GAMES LIST -->
  <section class="bg-purple-700 py-20">
    <div class="flex flex-col items-center px-6">
      <p class="text-white text-4xl mb-10 font-medium">Search games</p>
      <div class="relative w-full max-w-[550px]">
        <input type="text" id="searchInput" placeholder="Search for games..." 
          class="w-full h-20 rounded-full border-4 border-black px-14 text-2xl focus:outline-none shadow-lg"/>
        <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-3xl text-gray-500"></i>
      </div>
      <div id="results" class="w-full max-w-7xl mt-16 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>
    </div>
  </section>

  <!-- PRODUCT / SERVICES PAGE -->
  <div id="productPage" class="hidden bg-white">
    <div class="max-w-6xl mx-auto px-6 py-12">
      <button onclick="goBackToHome()" class="mb-8 flex items-center gap-2 text-lg hover:text-purple-600">
        ← Back to All Games
      </button>

      <div class="flex flex-col md:flex-row gap-10">
        <div class="md:w-5/12">
          <img id="productImage" class="w-full rounded-3xl shadow-2xl" alt="">
        </div>
        <div class="md:w-7/12">
          <h1 id="productTitle" class="text-5xl font-bold mb-2"></h1>
          <p id="productGenre" class="text-purple-600 text-xl"></p>

          <div class="mt-10">
            <h3 class="text-2xl font-semibold mb-6">Available Services</h3>
            <div id="servicesList" class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <!-- Services will be added here dynamically -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ABOUT, HELP, MEDIA (kept same) -->
  <section id="about" class="py-24 bg-white"> ... </section>
  <section id="help" class="py-24 bg-gray-100"> ... </section>
  <section id="media" class="py-24 bg-white"> ... </section>

  <!-- FOOTER -->
  <footer class="bg-gray-900 text-white text-center py-12">
    <p class="text-lg mb-2">© 2026 Turnip Services.com. All Rights Reserved.</p>
  </footer>

  <script>
    // === Your auth code stays the same (checkLoginStatus, login functions, etc.) ===

    const games = [
      { 
        id: 1, 
        title: "Rainbow Six Siege", 
        genre: "Tactical Shooter", 
        image: "https://images7.alphacoders.com/521/thumb-1920-521305.png",
        services: [
          { name: "Rank Boost", price: "29.99" },
          { name: "Account Recovery", price: "15.00" },
          { name: "Custom Loadout", price: "9.99" },
          { name: "Champions Boost", price: "49.99" }
        ]
      },
      { 
        id: 2, 
        title: "Apex Legends", 
        genre: "Battle Royale", 
        image: "https://images.alphacoders.com/992/thumbbig-992948.webp",
        services: [
          { name: "Rank Boost", price: "24.99" },
          { name: "Legend Unlock", price: "19.99" },
          { name: "Predator Boost", price: "59.99" }
        ]
      }
      // Add more games later...
    ];

    // Rest of your search + display logic
    const searchInput = document.getElementById('searchInput');
    const resultsContainer = document.getElementById('results');

    function displayGames(filteredGames) {
      resultsContainer.innerHTML = '';
      filteredGames.forEach(game => {
        const card = document.createElement('div');
        card.className = "game-card bg-white rounded-2xl overflow-hidden shadow-xl";
        card.innerHTML = `
          <img src="${game.image}" alt="${game.title}">
          <div class="p-5">
            <h3 class="font-bold text-xl mb-1">${game.title}</h3>
            <p class="text-purple-600 font-medium">${game.genre}</p>
          </div>
        `;
        card.onclick = () => showServicesPage(game);
        resultsContainer.appendChild(card);
      });
    }

    function showServicesPage(game) {
      document.getElementById('mainContent').classList.add('hidden'); // You'll need to wrap search in a div with id="mainContent"
      document.getElementById('productPage').classList.remove('hidden');

      document.getElementById('productImage').src = game.image;
      document.getElementById('productTitle').textContent = game.title;
      document.getElementById('productGenre').textContent = game.genre;

      const servicesHTML = game.services.map(service => `
        <div class="bg-gray-50 p-6 rounded-2xl border">
          <h4 class="font-semibold text-lg">${service.name}</h4>
          <p class="text-3xl font-bold text-black mt-2">$${service.price}</p>
          <button onclick="buyService('${service.name}', '${service.price}')" 
            class="mt-4 w-full bg-black text-white py-3 rounded-xl hover:bg-gray-800">
            Buy Now
          </button>
        </div>
      `).join('');

      document.getElementById('servicesList').innerHTML = servicesHTML;
    }

    function buyService(name, price) {
      alert(`Added to cart: ${name} - $${price}\n\n(This feature is coming soon)`);
    }

    function goBackToHome() {
      document.getElementById('productPage').classList.add('hidden');
      document.getElementById('mainContent').classList.remove('hidden');
    }

    function scrollToGames() {
      goBackToHome();
      setTimeout(() => document.getElementById('results').scrollIntoView({ behavior: 'smooth' }), 100);
    }

    // Search
    searchInput.addEventListener('input', () => {
      const query = searchInput.value.toLowerCase().trim();
      const filtered = games.filter(game => 
        game.title.toLowerCase().includes(query) || game.genre.toLowerCase().includes(query)
      );
      displayGames(filtered);
    });

    displayGames(games);
    checkLoginStatus();   // your login function
  </script>
</body>
</html>
