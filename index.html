<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turnip Services</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50">

  <!-- Navigation -->
  <nav class="bg-white shadow-md py-4 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
      <h1 class="text-3xl font-bold text-purple-700">Turnip Services</h1>
      
      <div class="flex items-center gap-4">
        <a href="#" class="px-6 py-2 rounded-full border border-gray-300 hover:bg-gray-100">Help</a>
        <a href="#" class="px-6 py-2 rounded-full border border-gray-300 hover:bg-gray-100">About</a>
        <a href="#" class="px-6 py-2 rounded-full border border-gray-300 hover:bg-gray-100">Media</a>
        <a href="#" class="px-6 py-2 bg-black text-white rounded-full font-medium">Login / Sign Up</a>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <header class="bg-gradient-to-b from-purple-600 to-purple-700 text-white py-28 text-center">
    <div class="max-w-5xl mx-auto px-6">
      <h2 class="text-6xl font-bold mb-6">Welcome to Turnip Services!</h2>
      
      <!-- Longer Search Bar -->
      <div class="max-w-2xl mx-auto mt-12">
        <div class="relative">
          <input 
            type="text" 
            placeholder="Search for products or services..." 
            class="w-full px-8 py-5 text-lg rounded-full shadow-lg focus:outline-none focus:ring-4 focus:ring-purple-300">
          <button class="absolute right-4 top-1/2 -translate-y-1/2 bg-white text-purple-700 px-8 py-3 rounded-full font-semibold hover:bg-gray-100">
            <i class="fas fa-search"></i> Search
          </button>
        </div>
      </div>
    </div>
  </header>

  <footer class="bg-gray-900 text-white py-8 text-center mt-20">
    <p>&copy; 2026 Turnip Services. All Rights Reserved.</p>
  </footer>

</body>
</html>
