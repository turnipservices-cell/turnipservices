<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnip Services • Elite Gaming Boost & Training</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Press+Start+2P&display=swap');
        
        :root {
            --primary: #00ff9d;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .game-font {
            font-family: 'Press Start 2P', sans-serif;
        }

        .hero-bg {
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), url('https://images.unsplash.com/photo-1616588587683-4e6e7b8e0f0f?q=80&w=2070') center/cover no-repeat;
        }

        .nav-link {
            transition: all 0.3s ease;
        }
        
        .nav-link:hover {
            color: var(--primary);
            transform: translateY(-2px);
        }

        .service-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .service-card:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 25px 50px -12px rgb(0 255 157 / 0.25);
        }

        .glow {
            text-shadow: 0 0 20px rgb(0 255 157);
        }
    </style>
</head>
