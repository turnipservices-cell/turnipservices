<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Purple Background Full Height</title>

<style>
  /* Make sure the page itself stretches */
  html, body {
    height: 100%;
    margin: 0;
  }

  /* Full-page background */
  body {
    background-color: purple;
  }

  /* If you're using a container instead of body */
  .container {
    min-height: 100vh; /* key part */
    background-color: purple;
  }
</style>
</head>

<body>

  <!-- Option A: background on body -->
  <h1 style="color: white; text-align: center; padding-top: 50px;">
    Hello
  </h1>

  <!-- Option B: if you use a wrapper instead -->
  <!--
  <div class="container">
    <h1>Hello</h1>
  </div>
  -->

</body>
</html>
