<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnip Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .purple-circle {
            width: 520px;
            height: 520px;
            background: #6b21a8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }
    </style>
</head>
<body class="bg-white">

    <!-- Navigation -->
    <nav class="bg-white border-b py-5 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-8 flex justify-between items-center">
            <div class="flex gap-6">
                <button class="px-6 py-2 border border-gray-800 rounded-full font-medium">Help</button>
                <button class="px-6 py-2 border border-gray-800 rounded-full font-medium">About</button>
            </div>
            
            <div class="flex gap-6">
                <button class="px-6 py-2 border border-gray-800 rounded-full font-medium">Media</button>
                <button class="px-6 py-2 bg-black text-white rounded-full font-medium">Login / Sign Up</button>
            </div>
        </div>
    </nav>

    <!-- Hero with Big Purple Circle -->
    <section class="min-h-screen flex items-center justify-center pt-10">
        <div class="text-center">
            <div class="purple-circle mx-auto">
                <div class="text-center px-10">
                    <h1 class="text-5xl font-bold text-white mb-2">Welcome to</h1>
                    <h1 class="text-6xl font-bold text-white leading-none">Turnip Services!</h1>
                    
                    <div class="mt-12">
                        <p class="text-white text-lg mb-3">Search for products</p>
                        <div class="relative max-w-xs mx-auto">
                            <input 
                                type="text" 
                                placeholder="Headsets, Keyboards, Mice..." 
                                class="w-full px-6 py-4 rounded-full text-center focus:outline-none">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
