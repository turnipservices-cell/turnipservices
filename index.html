<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnip Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, sans-serif; }
    </style>
</head>
<body class="bg-white">

    <!-- Navigation -->
    <nav class="pt-8 pb-6 border-b">
        <div class="max-w-6xl mx-auto px-8 flex justify-between items-center">
            <div class="flex gap-4">
                <button class="px-8 py-3 border-2 border-black rounded-3xl font-medium text-lg">Help</button>
                <button class="px-8 py-3 border-2 border-black rounded-3xl font-medium text-lg">About</button>
            </div>
            
            <div class="flex gap-4">
                <button class="px-8 py-3 border-2 border-black rounded-3xl font-medium text-lg">Media</button>
                <button class="px-8 py-3 bg-black text-white rounded-3xl font-medium text-lg">Login/SignUp</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="min-h-screen">
        <!-- White Top Section -->
        <div class="bg-white pt-20 pb-12">
            <div class="text-center">
                <h1 class="text-6xl md:text-7xl font-bold text-black">Welcome to</h1>
            </div>
        </div>

        <!-- Purple Bottom Section -->
        <div class="bg-[#6b21a8] min-h-[60vh] flex items-center justify-center relative">
            <div class="text-center px-6">
                <h1 class="text-6xl md:text-7xl font-bold text-white">Turnip Services!</h1>
                
                <div class="mt-16">
                    <p class="text-white text-2xl mb-6">Search for products</p>
                    <div class="max-w-md mx-auto">
                        <input 
                            type="text" 
                            placeholder="Search for products..." 
                            class="w-full px-8 py-6 rounded-full border-4 border-black text-lg focus:outline-none">
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
