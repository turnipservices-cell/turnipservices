<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turnip Services</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  
  <style>
    .game-card {
      transition: all 0.3s ease;
    }
    .game-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
    }
    .game-card img {
      height: 220px;
      object-fit: cover;
      width: 100%;
    }
  </style>
</head>
<body class="bg-gray-100 font-sans">

  <!-- NAVBAR -->
  <nav class="bg-white border-b border-gray-200 py-5 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
      <h1 class="text-3xl font-bold text-black">Turnip Services</h1>
      <div class="flex items-center gap-5">
        <a href="#" class="px-8 py-3 border-2 border-black rounded-full text-lg font-medium hover:bg-gray-100 transition">Help</a>
        <a href="#" class="px-8 py-3 border-2 border-black rounded-full text-lg font-medium hover:bg-gray-100 transition">About</a>
        <a href="#" class="px-8 py-3 border-2 border-black rounded-full text-lg font-medium hover:bg-gray-100 transition">Media</a>
        <a href="#" class="px-8 py-3 bg-black text-white rounded-full text-lg font-semibold hover:bg-gray-800 transition">Login/SignUp</a>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="bg-white text-center py-32">
    <div class="max-w-5xl mx-auto px-6">
      <h2 class="text-7xl font-black text-black leading-tight">
        Welcome to <br /> Turnip Services!
      </h2>
    </div>
  </section>

  <!-- SEARCH SECTION -->
  <section class="bg-purple-700 py-20">
    <div class="flex flex-col items-center px-6">
      <p class="text-white text-4xl mb-10 font-medium">Search games</p>
      
      <div class="relative w-full max-w-[550px]">
        <input
          type="text"
          id="searchInput"
          placeholder="Search for games..."
          class="w-full h-20 rounded-full border-4 border-black px-14 text-2xl focus:outline-none shadow-lg"
        />
        <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-3xl text-gray-500"></i>
      </div>

      <div id="results" class="w-full max-w-7xl mt-16 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="bg-gray-900 text-white text-center py-8">
    <p class="text-lg">© 2026 Turnip Services. All Rights Reserved.</p>
  </footer>

  <script>
    const games = [
      {
        title: "Rainbow Six Siege",
        genre: "Tactical Shooter",
        image: "https://www.reddit.com/r/Rainbow6/comments/rtskjc/this_was_the_best_loading_screenchange_my_mind/#lightbox"
      },
      {
        title: "Apex Legends",
        genre: "Battle Royale",
        image: "https://picsum.photos/id/870/800/600"
      },
      {
        title: "Call of Duty: Warzone",
        genre: "Battle Royale",
        image: "https://picsum.photos/id/106/800/600"
      },
      {
        title: "Minecraft",
        genre: "Sandbox Survival",
        image: "https://picsum.photos/id/133/800/600"
      },
      {
        title: "Valorant",
        genre: "Tactical Shooter",
        image: "https://picsum.photos/id/201/800/600"
      },
      {
        title: "Fortnite",
        genre: "Battle Royale",
        image: "https://picsum.photos/id/180/800/600"
      }
    ];

    const searchInput = document.getElementById('searchInput');
    const resultsContainer = document.getElementById('results');

    function displayGames(filteredGames) {
      resultsContainer.innerHTML = '';
      if (filteredGames.length === 0) {
        resultsContainer.innerHTML = `
          <div class="col-span-full text-center py-20">
            <p class="text-2xl text-white">No games found 😔</p>
            <p class="text-purple-200 mt-2">Try different keywords</p>
          </div>
        `;
        return;
      }

      filteredGames.forEach(game => {
        const card = document.createElement('div');
        card.className = "game-card bg-white rounded-2xl overflow-hidden shadow-xl";
        card.innerHTML = `
          <img src="${game.image}" alt="${game.title}">
          <div class="p-5">
            <h3 class="font-bold text-xl mb-1">${game.title}</h3>
            <p class="text-purple-600 font-medium">${game.genre}</p>
          </div>
        `;
        resultsContainer.appendChild(card);
      });
    }

    if (searchInput) {
      searchInput.addEventListener('input', () => {
        const query = searchInput.value.toLowerCase().trim();
        const filtered = games.filter(game => 
          game.title.toLowerCase().includes(query) || 
          game.genre.toLowerCase().includes(query)
        );
        displayGames(filtered);
      });
      displayGames(games);
    }
  </script>
</body>
</html>
