<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnip Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-white">

    <!-- Navigation -->
    <nav class="pt-8 pb-6 border-b">
        <div class="max-w-6xl mx-auto px-8 flex justify-between items-center">
            <div class="flex gap-4">
                <button class="px-8 py-3 border-2 border-black rounded-3xl font-medium text-lg">Help</button>
                <button class="px-8 py-3 border-2 border-black rounded-3xl font-medium text-lg">About</button>
            </div>
            
            <div class="flex gap-4">
                <button class="px-8 py-3 border-2 border-black rounded-3xl font-medium text-lg">Media</button>
                <button class="px-8 py-3 bg-black text-white rounded-3xl font-medium text-lg">Login/SignUp</button>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <div class="min-h-screen flex flex-col">
        <!-- Smaller White Top -->
        <div class="bg-white flex-1 flex items-end justify-center pb-8">
            <div class="text-center">
                <h1 class="text-6xl md:text-7xl font-bold text-black">Welcome to</h1>
                <h1 class="text-6xl md:text-7xl font-bold text-white -mt-3">Turnip Services!</h1>
            </div>
        </div>

        <!-- Purple Section -->
        <div class="bg-[#6b21a8] flex-1 flex items-center justify-center">
            <div class="text-center px-6 w-full max-w-3xl">
                <div class="mt-8">
                    <p class="text-white text-xl mb-4">Search for products</p>
                    <div class="relative max-w-md mx-auto">
                        <input 
                            type="text" 
                            placeholder="" 
                            class="w-full px-6 py-5 pl-14 rounded-full border-4 border-black text-lg focus:outline-none bg-white">
                        <div class="absolute left-6 top-1/2 -translate-y-1/2 text-black text-2xl">🔍</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
