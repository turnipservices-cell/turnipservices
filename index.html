  <script>
    // Sample Games Data
    const games = [
      { title: "Stardew Valley", genre: "Farming Simulator", image: "https://picsum.photos/id/1015/300/200" },
      { title: "Turnip Boy Commits Tax Evasion", genre: "Adventure", image: "https://picsum.photos/id/237/300/200" },
      { title: "Animal Crossing: New Horizons", genre: "Life Simulation", image: "https://picsum.photos/id/201/300/200" },
      { title: "The Legend of Zelda: Breath of the Wild", genre: "Action Adventure", image: "https://picsum.photos/id/180/300/200" },
      { title: "Hollow Knight", genre: "Metroidvania", image: "https://picsum.photos/id/251/300/200" },
      { title: "Celeste", genre: "Platformer", image: "https://picsum.photos/id/133/300/200" }
    ];

    const searchInput = document.getElementById('searchInput');
    const resultsContainer = document.getElementById('results');

    console.log("Script loaded - searchInput:", !!searchInput); // Debug line

    function displayGames(filteredGames) {
      resultsContainer.innerHTML = '';

      if (filteredGames.length === 0) {
        resultsContainer.innerHTML = `
          <div class="col-span-full text-center py-20">
            <p class="text-2xl text-white">No games found 😔</p>
            <p class="text-purple-200 mt-2">Try different keywords</p>
          </div>
        `;
        return;
      }

      filteredGames.forEach(game => {
        const card = document.createElement('div');
        card.className = "game-card bg-white rounded-2xl overflow-hidden shadow-xl";
        card.innerHTML = `
          <img src="${game.image}" alt="${game.title}" class="w-full h-48 object-cover">
          <div class="p-5">
            <h3 class="font-bold text-xl mb-1">${game.title}</h3>
            <p class="text-purple-600 font-medium">${game.genre}</p>
          </div>
        `;
        resultsContainer.appendChild(card);
      });
    }

    // Live Search
    if (searchInput) {
      searchInput.addEventListener('input', () => {
        const query = searchInput.value.toLowerCase().trim();
        console.log("Searching for:", query);   // Debug

        const filtered = games.filter(game => 
          game.title.toLowerCase().includes(query) || 
          game.genre.toLowerCase().includes(query)
        );

        displayGames(filtered);
      });

      // Show all games on load
      displayGames(games);
    } else {
      console.error("Search input not found!");
    }
  </script>
