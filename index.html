<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Turnip Services</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>

<body class="bg-gray-100 font-sans overflow-hidden">

  <!-- NAVIGATION -->
  <nav class="bg-white border-b border-gray-200 py-4">
    <div class="max-w-7xl mx-auto px-8 flex items-center justify-between">

      <!-- Left Buttons -->
      <div class="flex gap-4">
        <a href="#" class="px-6 py-2 border-4 border-black rounded-full text-lg font-semibold hover:bg-gray-100 transition">
          Help
        </a>

        <a href="#" class="px-6 py-2 border-4 border-black rounded-full text-lg font-semibold hover:bg-gray-100 transition">
          About
        </a>
      </div>

      <!-- Right Buttons -->
      <div class="flex gap-4">
        <a href="#" class="px-6 py-2 border-4 border-black rounded-full text-lg font-semibold hover:bg-gray-100 transition">
          Media
        </a>

        <a href="#" class="px-6 py-2 bg-black text-white rounded-full text-lg font-semibold hover:bg-gray-800 transition">
          Login/SignUp
        </a>
      </div>

    </div>
  </nav>

  <!-- HERO -->
  <section class="bg-[#f5f5f5] py-24 text-center">

    <h1 class="text-7xl font-black text-black leading-tight">
      Welcome to <br>
      Turnip Services!
    </h1>

  </section>

  <!-- SEARCH SECTION -->
  <section class="bg-purple-700 py-20">

    <div class="flex flex-col items-center">

      <!-- Search Text -->
      <p class="text-white text-2xl mb-6">
        Search games
      </p>

      <!-- Search Bar -->
      <div class="relative w-[380px]">

        <input
          type="text"
          class="w-full h-16 rounded-full border-[5px] border-black bg-white pl-14 text-xl focus:outline-none"
        />

        <!-- Search Icon -->
        <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-2xl text-gray-500"></i>

      </div>

    </div>

  </section>

</body>
</html>
