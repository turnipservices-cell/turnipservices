<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnip Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .purple-circle {
            width: 560px;
            height: 560px;
            background: #7c3aed;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 30px 60px -10px rgba(0, 0, 0, 0.35);
        }
    </style>
</head>
<body class="bg-white min-h-screen">

    <!-- Top Navigation -->
    <nav class="border-b py-6">
        <div class="max-w-6xl mx-auto px-8 flex justify-between items-center">
            <div class="flex gap-4">
                <button class="px-8 py-3 border-2 border-black rounded-full font-medium text-lg">Help</button>
                <button class="px-8 py-3 border-2 border-black rounded-full font-medium text-lg">About</button>
            </div>
            
            <div class="flex gap-4">
                <button class="px-8 py-3 border-2 border-black rounded-full font-medium text-lg">Media</button>
                <button class="px-8 py-3 bg-black text-white rounded-full font-medium text-lg">Login/SignUp</button>
            </div>
        </div>
    </nav>

    <!-- Main Hero -->
    <div class="flex items-center justify-center min-h-[calc(100vh-90px)] pt-10">
        <div class="text-center">
            <div class="purple-circle mx-auto">
                <div class="text-center px-12">
                    <h1 class="text-5xl font-bold text-white mb-3">Welcome to</h1>
                    <h1 class="text-6xl md:text-7xl font-bold text-white leading-none">Turnip Services!</h1>
                    
                    <div class="mt-14">
                        <p class="text-white text-xl mb-4">Search for products</p>
                        <div class="max-w-md mx-auto">
                            <div class="bg-white rounded-full p-2 shadow-inner">
                                <input 
                                    type="text" 
                                    placeholder="Search for products..." 
                                    class="w-full px-8 py-5 rounded-full text-lg focus:outline-none">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
