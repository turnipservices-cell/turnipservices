<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turnip Services</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body class="bg-gray-100 font-sans">

  <!-- NAVBAR -->
  <nav class="bg-white border-b border-gray-200 py-5 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">

      <!-- Logo -->
      <h1 class="text-3xl font-bold text-black">
        Turnip Services
      </h1>

      <!-- Buttons -->
      <div class="flex items-center gap-5">

        <a href="#"
          class="px-8 py-3 border-2 border-black rounded-full text-lg font-medium hover:bg-gray-100 transition">
          Help
        </a>

        <a href="#"
          class="px-8 py-3 border-2 border-black rounded-full text-lg font-medium hover:bg-gray-100 transition">
          About
        </a>

        <a href="#"
          class="px-8 py-3 border-2 border-black rounded-full text-lg font-medium hover:bg-gray-100 transition">
          Media
        </a>

        <a href="#"
          class="px-8 py-3 bg-black text-white rounded-full text-lg font-semibold hover:bg-gray-800 transition">
          Login/SignUp
        </a>

      </div>
    </div>
  </nav>

  <!-- HERO SECTION -->
  <section class="bg-white text-center py-32">

    <div class="max-w-5xl mx-auto px-6">

      <!-- Main Title -->
      <h2 class="text-7xl font-black text-black leading-tight">
        Welcome to <br />
        Turnip Services!
      </h2>

    </div>
  </section>

  <!-- SEARCH SECTION -->
  <section class="bg-purple-700 py-32">

    <div class="flex flex-col items-center">

      <!-- Search Text -->
      <p class="text-white text-4xl mb-8 font-medium">
        Search games
      </p>

      <!-- Search Bar -->
      <div class="relative w-[550px]">

        <input
          type="text"
          placeholder=""
          class="w-full h-20 rounded-full border-4 border-black px-8 text-2xl focus:outline-none shadow-lg"
        />

        <!-- Search Icon -->
        <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-2xl text-gray-500"></i>

      </div>

    </div>
  </section>

  <!-- FOOTER -->
  <footer class="bg-gray-900 text-white text-center py-8">
    <p class="text-lg">
      © 2026 Turnip Services. All Rights Reserved.
    </p>
  </footer>

</body>
</html>
